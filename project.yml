name: Zenly

# ─────────────────────────────────────────────────────────────────────────────
# XcodeGen manifest — the single source of truth for Zenly's project structure.
# After editing this file, run `xcodegen generate` to rebuild Zenly.xcodeproj.
# Do NOT edit the generated .xcodeproj by hand.
# ─────────────────────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: me.adithyan.shalinth
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    DEVELOPMENT_TEAM: 649T62WKAQ
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_EMIT_LOC_STRINGS: YES

# App Group shared by every target. Defined once here, referenced in each
# target's entitlements below so the identifier can never drift.
fileGroups:
  - project.yml

packages:
  SpotifyiOS:
    url: https://github.com/spotify/ios-sdk
    branch: master

targets:
  # ───────────────────────────── Main app ─────────────────────────────
  Zenly:
    type: application
    platform: iOS
    sources:
      - path: Zenly
      - path: Shared
    dependencies:
      - target: ZenlyMonitor
      - target: ZenlyShield
      - target: ZenlyShieldAction
      - target: ZenlyReport
      - target: ZenlyWidget
      - package: SpotifyiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.Zenly
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Zenly/Info.plist
      properties:
        UILaunchScreen: {}
        # Zenly uses only exempt encryption (HTTPS + Apple standard frameworks),
        # so declare no non-exempt encryption — stops the per-build export
        # compliance prompt in App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCalendarsFullAccessUsageDescription: "Zenly reads your calendar to auto-start focus sessions during free time."
        NSRemindersFullAccessUsageDescription: "Zenly syncs your focus tasks with Reminders."
        NSAppleMusicUsageDescription: "Zenly controls focus music playback from your library."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - zenly
        LSApplicationQueriesSchemes:
          - spotify
        UIBackgroundModes:
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - me.adithyan.shalinth.Zenly.refresh
    entitlements:
      path: Zenly/Zenly.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.me.adithyan.shalinth.Zenly

  # ─────────────── DeviceActivityMonitor extension (schedules) ───────────────
  ZenlyMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: ZenlyMonitor
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.Zenly.ZenlyMonitor
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: ZenlyMonitor/Info.plist
      properties:
        CFBundleDisplayName: ZenlyMonitor
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DeviceActivityMonitorExtension
    entitlements:
      path: ZenlyMonitor/ZenlyMonitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.me.adithyan.shalinth.Zenly

  # ─────────────── ShieldConfiguration extension (custom shield UI) ───────────────
  ZenlyShield:
    type: app-extension
    platform: iOS
    sources:
      - path: ZenlyShield
      - path: Shared/AppGroup.swift
      - path: Shared/DistractionLog.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.Zenly.ZenlyShield
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: ZenlyShield/Info.plist
      properties:
        CFBundleDisplayName: ZenlyShield
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigurationExtension
    entitlements:
      path: ZenlyShield/ZenlyShield.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.adithyan.shalinth.Zenly

  # ─────────────── ShieldAction extension (shield button handling) ───────────────
  ZenlyShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: ZenlyShieldAction
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.Zenly.ZenlyShieldAction
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: ZenlyShieldAction/Info.plist
      properties:
        CFBundleDisplayName: ZenlyShieldAction
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettings.shield-action-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldActionExtension
    entitlements:
      path: ZenlyShieldAction/ZenlyShieldAction.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.adithyan.shalinth.Zenly

  # ─────────────── DeviceActivityReport extension (app usage) ───────────────
  ZenlyReport:
    type: extensionkit-extension
    platform: iOS
    sources:
      - path: ZenlyReport
      - path: Shared/ReportContext.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.Zenly.ZenlyReport
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: ZenlyReport/Info.plist
      properties:
        CFBundleDisplayName: ZenlyReport
        # DeviceActivityReport is an ExtensionKit extension (must live in
        # Extensions/, not PlugIns/, with EXAppExtensionAttributes).
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.deviceactivityui.report-extension
    entitlements:
      path: ZenlyReport/ZenlyReport.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.me.adithyan.shalinth.Zenly

  # ───────────────────────── WidgetKit widget ─────────────────────────
  ZenlyWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ZenlyWidget
      - path: Shared/AppGroup.swift
      - path: Shared/StatsSnapshot.swift
      - path: Shared/FocusActivityAttributes.swift
      - path: Shared/Color+Hex.swift
      - path: Shared/StartFocusIntent.swift
      - path: Shared/FocusLaunchRequest.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.Zenly.ZenlyWidget
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: ZenlyWidget/Info.plist
      properties:
        CFBundleDisplayName: Zenly
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ZenlyWidget/ZenlyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.adithyan.shalinth.Zenly

  # ───────────────────────────── Tests ─────────────────────────────
  ZenlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZenlyTests
    dependencies:
      - target: Zenly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.ZenlyTests
        GENERATE_INFOPLIST_FILE: YES

  ZenlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ZenlyUITests
    dependencies:
      - target: Zenly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.adithyan.shalinth.ZenlyUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Zenly:
    build:
      targets:
        Zenly: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ZenlyTests
        - ZenlyUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
